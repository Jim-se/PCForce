{% extends 'base.html' %}

{% block content %}
<div class="review-page container">
    <h1>Review {{ product.name }}</h1>

    <form class="card p-4" method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-dark" type="submit">Submit review</button>
    </form>

    <a class="btn btn-light" href="{% url 'product_details' product.uuid %}">Cancel</a>
</div>
{% endblock %}
